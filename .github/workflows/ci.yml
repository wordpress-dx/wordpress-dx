name: 🤖 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-tests:
    name: CLI — integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        working-directory: cli
        run: pnpm build

      - name: Start WordPress
        uses: loopress/setup-ci@main

      - name: Extract app password
        id: wp-creds
        run: |
          APP_PASS=$(jq -r '.sites[0].app_password' ~/.lps/sites.json)
          echo "app-password=$APP_PASS" >> $GITHUB_OUTPUT

      - name: Run CLI tests
        working-directory: cli
        env:
          WP_URL: http://localhost:8080
          WP_USERNAME: admin
          WP_APP_PASSWORD: ${{ steps.wp-creds.outputs.app-password }}
        run: pnpm test

  plugin-php:
    name: Plugin — PHPStan + PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wordpress-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan analysis
        run: composer run analyse

      # - name: Run psalm
      #   run: composer run psalm

      - name: PHPUnit tests
        run: composer run test

  plugin-frontend:
    name: Plugin — Frontend (Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wordpress-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test
