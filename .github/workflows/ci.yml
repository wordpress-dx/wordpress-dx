name: 🤖 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli-tests:
    name: CLI:integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/cli...

      - name: Build CLI
        working-directory: cli
        run: pnpm build

      - name: Start WordPress
        uses: loopress/setup-ci@main

      - name: Extract app password
        id: wp-creds
        run: |
          TOKEN=$(jq -r '.projects[.currentProject] as $p | $p.environments[$p.currentEnv].token' ~/.loopress/config.json)
          echo "app-password=${TOKEN#*:}" >> $GITHUB_OUTPUT

      - name: Run CLI tests
        working-directory: cli
        env:
          WP_URL: http://localhost:8080
          WP_USERNAME: admin
          WP_APP_PASSWORD: ${{ steps.wp-creds.outputs.app-password }}
        run: pnpm test

  plugin-php:
    name: Plugin:PHPStan + PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wordpress-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan analysis
        run: composer run analyse

      # - name: Run psalm
      #   run: composer run psalm

      - name: PHPUnit tests
        run: composer run test

  plugin-frontend:
    name: Plugin:Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @loopress/wordpress-plugin...

      - name: Run tests
        working-directory: wordpress-plugin
        run: pnpm test

      - name: Run build
        working-directory: wordpress-plugin
        run: pnpm build
